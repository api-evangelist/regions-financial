specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: regions-financial
providerId: regions-financial
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Banking
  - FDX
description: FinOps shape for Regions Financial banking integrations. Spend is invoiced under treasury-management
  or aggregator contracts; there is no metered self-serve API to reconcile.
sources:
  - https://www.regions.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Regions Bank
serviceCategory: Banking
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Regions Bank
  ServiceCategory: Banking
  ProviderName: Regions Financial
  PublisherName: Regions Bank
  InvoiceIssuerName: Regions Bank
  BillingCurrency: USD
meters:
  - name: contract_term
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility comes from the Regions treasury-management or aggregator invoice; no programmatic
      usage feed for FDX or commercial APIs is published.
  - name: Allocation
    description: Allocate to the corporate treasury function (commercial APIs) or to the aggregator product
      that consumes the FDX feed.
  - name: Optimization
    description: Optimization is contractual — bundle treasury services, renegotiate aggregator scope,
      and consolidate authentication endpoints under one agreement.
  - name: Accountability
    description: Owner is the corporate-treasury or aggregator-management function that holds the Regions
      contract.
notes: Bank integrations are contractual and aggregator-mediated; no metered API. Generic FOCUS request
  meters removed.
maintainers:
