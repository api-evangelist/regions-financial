specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: regions-financial
providerId: regions-financial
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Banking
  - FDX
description: Regions Bank does not publish a public API rate-limit reference. Consumer account-data sharing
  flows through FDX-aligned aggregator agreements (which carry their own per-aggregator caps) and any
  treasury/commercial API limits live in the customer contract.
sources:
  - https://www.regions.com/
notes: No public developer rate-limit documentation; throttling lives in aggregator agreements or commercial
  customer contracts.
limits:
  - name: Aggregator / customer-contract throttling
    scope: contract
    metric: varies
    limit: 'see Regions aggregator or treasury-management agreement'
policies:
  - name: Contractual Throttling
    description: Rate limits and quotas for Regions APIs are defined in the data-aggregator agreement
      (FDX consumer access) or treasury-management contract (commercial API), not on a public page.
maintainers:
