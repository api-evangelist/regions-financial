description: Regions Financial (Regions Bank) is a Fortune 500 US bank. It does not publish a public,
  self-serve developer API or pricing. Account-data sharing for consumers happens through FDX-aligned
  data-aggregator partnerships rather than a Regions developer plan, and treasury / commercial integrations
  are negotiated through Treasury Management sales.
sources:
  - https://www.regions.com/
notes: No public developer portal or pricing page found. FDX-style account access is brokered via aggregators
  (e.g. Akoya, Plaid, Finicity); commercial APIs are sold through Treasury Management. Scaffold trimmed
  to one Contact Sales plan.
plans:
  - id: regions-financial-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Regions API access (FDX consumer-data sharing via aggregator, commercial / treasury
      APIs) is arranged through Regions partnerships or Treasury Management. No published list price.
    entries:
      - label: Bank API Integration
        name: bank_integration
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: FDX Aggregator Access
      - name: Treasury Management
      - name: Custom Integration
