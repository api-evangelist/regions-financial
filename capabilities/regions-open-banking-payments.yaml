naftiko: 1.0.0-alpha2
info:
  label: Regions Open Banking API — Payments
  description: 'Regions Open Banking API — Payments. 2 operations. Lead operation: Initiate Payment. Self-contained Naftiko
    capability covering one Regions Financial business surface.'
  tags:
  - Regions Financial
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REGIONS_FINANCIAL_API_KEY: REGIONS_FINANCIAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: regions-open-banking-payments
    baseUri: https://api.regions.com/v1
    description: Regions Open Banking API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: initiatepayment
        method: POST
        description: Initiate Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: payments-paymentId
      path: /payments/{paymentId}
      operations:
      - name: getpayment
        method: GET
        description: Get Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.REGIONS_FINANCIAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: regions-open-banking-payments-rest
    port: 8080
    description: REST adapter for Regions Open Banking API — Payments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: POST
        name: initiatepayment
        description: Initiate Payment
        call: regions-open-banking-payments.initiatepayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentid}
      name: payments-paymentid
      description: REST surface for payments-paymentId.
      operations:
      - method: GET
        name: getpayment
        description: Get Payment
        call: regions-open-banking-payments.getpayment
        with:
          paymentId: rest.paymentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: regions-open-banking-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Regions Open Banking API — Payments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: initiate-payment
      description: Initiate Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: regions-open-banking-payments.initiatepayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment
      description: Get Payment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: regions-open-banking-payments.getpayment
      with:
        paymentId: tools.paymentId
      outputParameters:
      - type: object
        mapping: $.
