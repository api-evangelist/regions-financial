naftiko: 1.0.0-alpha2
info:
  label: Regions Open Banking API — Transactions
  description: 'Regions Open Banking API — Transactions. 1 operations. Lead operation: List Transactions. Self-contained Naftiko
    capability covering one Regions Financial business surface.'
  tags:
  - Regions Financial
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REGIONS_FINANCIAL_API_KEY: REGIONS_FINANCIAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: regions-open-banking-transactions
    baseUri: https://api.regions.com/v1
    description: Regions Open Banking API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-transactions
      path: /accounts/{accountId}/transactions
      operations:
      - name: listtransactions
        method: GET
        description: List Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Start date for transaction range (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date for transaction range (YYYY-MM-DD)
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.REGIONS_FINANCIAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: regions-open-banking-transactions-rest
    port: 8080
    description: REST adapter for Regions Open Banking API — Transactions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/transactions
      name: accounts-accountid-transactions
      description: REST surface for accounts-accountId-transactions.
      operations:
      - method: GET
        name: listtransactions
        description: List Transactions
        call: regions-open-banking-transactions.listtransactions
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: regions-open-banking-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Regions Open Banking API — Transactions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-transactions
      description: List Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: regions-open-banking-transactions.listtransactions
      with:
        startDate: tools.startDate
        endDate: tools.endDate
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
